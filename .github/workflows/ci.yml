name: CI

on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            api: ${{ steps.filter.outputs.api }}
        steps:
            - uses: actions/checkout@v4

            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      api:
                        - 'apps/api/**'
                        - 'packages/utils/**'
                        - 'package.json'
                        - 'pnpm-lock.yaml'

    api-lint:
        name: "API — lint"
        needs: changes
        if: needs.changes.outputs.api == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm --filter @kaizen/api lint

    api-build:
        name: "API — build"
        needs: changes
        if: needs.changes.outputs.api == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm --filter @kaizen/api build

    api-test:
        name: "API — tests"
        needs: changes
        if: needs.changes.outputs.api == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Unit tests
              run: pnpm --filter @kaizen/api test

            - name: Integration tests
              run: pnpm --filter @kaizen/api test:e2e
